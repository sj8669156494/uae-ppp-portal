services:
  # Backend — FastAPI
  - type: web
    name: uae-ppp-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: uae-ppp-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SCRAPER_DELAY_SECONDS
        value: "2"
      - key: SCRAPER_TIMEOUT_SECONDS
        value: "30"
      - key: MAX_RETRIES
        value: "3"

  # Frontend — React/Vite static site
  - type: web
    name: uae-ppp-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: uae-ppp-db
    databaseName: uae_ppp
    plan: free
